name: Deploy 한글자모탐험 to GitHub Pages

on:
  push:
    branches:
      - main   # main 브랜치에 push 할 때마다 자동 실행

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # 1) 저장소 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2) index.html 안의 __SHEET_API_URL__ → 실제 GAS URL로 교체
      - name: Inject GAS API URL
        run: |
          sed -i "s|__SHEET_API_URL__|${{ secrets.SHEET_API_URL }}|g" index.html

      # 3) GitHub Pages 업로드 준비
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4) 파일 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # 저장소 루트 전체 업로드

      # 5) GitHub Pages 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
