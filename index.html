<body>
  <div id="root"></div>

  <script type="text/babel">
  /* ── App code is identical to the GAS version ── */
  const { useState, useCallback, useEffect, useRef } = React;
  const { createRoot } = ReactDOM;

  const callGAS = (action, payload = {}) => {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          [action](action === 'getStudentsList' ? undefined : payload);
      });
    }
    const body = new URLSearchParams({ action, payload: JSON.stringify(payload) });
    return fetch(window.GAS_API_URL, { method: 'POST', body })
      .then(r => r.json())
      .then(r => { if (!r.success) throw new Error(r.error || 'API 오류'); return r.data; });
  };

  const loadHtml2Canvas = () => new Promise((resolve, reject) => {
    if (window.html2canvas) { resolve(window.html2canvas); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = () => resolve(window.html2canvas); s.onerror = reject;
    document.head.appendChild(s);
  });

  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  const PencilFairy = ({ className = '' }) => (
    <div className={`inline-block fairy-float ${className}`}>
      <svg width="8.75rem" height="11.25rem" viewBox="0 0 120 150" fill="none">

        <path d="M75 55C95 40 110 70 90 85C110 100 105 120 80 110" stroke="#CBD5E0" strokeWidth="2.5" strokeLinecap="round" opacity="0.6"/>
        <path d="M45 30L75 30V110L60 135L45 110V30Z" fill="#FFB74D" stroke="#4A5568" strokeWidth="2"/>
        <path d="M55 30V110" stroke="#F57C00" strokeWidth="1" opacity="0.3"/>
        <path d="M65 30V110" stroke="#F57C00" strokeWidth="1" opacity="0.3"/>
        <path d="M45 110L60 135L75 110H45Z" fill="#FFE0B2" stroke="#4A5568" strokeWidth="2"/>
        <path d="M54 125L60 135L66 125H54Z" fill="#37474F"/>
        <path d="M45 15C45 10 75 10 75 15V30H45V15Z" fill="#F48FB1" stroke="#4A5568" strokeWidth="2"/>
        <rect x="45" y="25" width="30" height="5" fill="#B0BEC5" stroke="#4A5568" strokeWidth="1"/>
        <circle cx="54" cy="60" r="2.5" fill="#37474F"/>
        <circle cx="66" cy="60" r="2.5" fill="#37474F"/>
        <path d="M58 70C58 70 60 72 62 70" stroke="#37474F" strokeWidth="1.5" strokeLinecap="round"/>
      </svg>
    </div>
  );

  // ── Icon components ──────────────────────────────────────────
  const Volume2 = ({size=24,className=''}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;
  const VolumeX = ({size=24,className=''}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>;
  const RefreshCw = ({size=24,className=''}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
  const ChevronRight = ({size=24,className=''}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
  const AlertCircle = ({size=24,className=''}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
  const Home = ({size=24,className=''}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
  const Mic = ({size=24,className=''}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>;

  // ── App (full source — same as document 2) ──────────────────
  const App = () => {
    const [stage, setStage] = useState('intro');
    const [level, setLevel] = useState(1);
    const [questionCount, setQuestionCount] = useState(5);
    const [progress, setProgress] = useState(0);
    const [currentTask, setCurrentTask] = useState(null);
    const [activeItems, setActiveItems] = useState([]);
    const [userInput, setUserInput] = useState([]);
    const [stars, setStars] = useState(0);
    const [feedbackText, setFeedbackText] = useState('');
    const [showCompletePopup, setShowCompletePopup] = useState(false);
    const [isMuted, setIsMuted] = useState(true);
    const [studentName, setStudentName] = useState('');
    const [showCountModal, setShowCountModal] = useState(false);
    const [selectedCount, setSelectedCount] = useState(5);
    const [showTutorial, setShowTutorial] = useState(false);
    const [tutorialStep, setTutorialStep] = useState(1);
    const [tutorialSubStep, setTutorialSubStep] = useState(0);
    const [tutorialEditPhase, setTutorialEditPhase] = useState(false);
    const [tutorialSlotFilled, setTutorialSlotFilled] = useState([true,true,true,true]);
    const [wrongTasks, setWrongTasks] = useState([]);
    const [correctItems, setCorrectItems] = useState([]);
    const [incorrectItems, setIncorrectItems] = useState([]);
    const [showWrongPopup, setShowWrongPopup] = useState(false);
    const [lastWrongAnswer, setLastWrongAnswer] = useState('');
    const learningDate = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
    const [currentTaskIndex, setCurrentTaskIndex] = useState(0);
    const [attempts, setAttempts] = useState(0);
    const [students, setStudents] = useState([]);
    const [isLoadingNames, setIsLoadingNames] = useState(true);
    const [recordStatus, setRecordStatus] = useState('');
    const [hasReviewed, setHasReviewed] = useState(false);
    const [tutorialVoiceStep, setTutorialVoiceStep] = useState(1);
    const [isRecording, setIsRecording] = useState(false);
    const [voiceText, setVoiceText] = useState('');
    const [voiceSaved, setVoiceSaved] = useState(false);
    const [voiceFeedback, setVoiceFeedback] = useState(null);
    const [voiceRecords, setVoiceRecords] = useState([]);
    const recognitionRef = useRef(null);
    const recTimeoutRef = useRef(null);
    const silenceTimerRef = useRef(null);
    const reportRef = useRef(null);
    const heardRef = useRef(false);
    const autoTimerRef = useRef(null);
    const micGrantedRef = useRef(false);

    useEffect(() => {
      callGAS('getStudentsList')
        .then(data => { if (data && data.length > 0) setStudents(data); setIsLoadingNames(false); })
        .catch(() => { setStudents([{num:1,name:'홍길동'},{num:2,name:'김철수'},{num:3,name:'이영희'}]); setIsLoadingNames(false); });
    }, []);

    useEffect(() => {
      if (stage === 'select_name' && !micGrantedRef.current && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(stream => { micGrantedRef.current = true; stream.getTracks().forEach(t => t.stop()); })
          .catch(() => {});
      }
    }, [stage]);

    const recordActivity = (correctCount, totalCount, cItems, iItems) => {
      const sheetMap = {1:'모음',2:'자음',3:'한 글자',4:'두 글자'};
      setRecordStatus('saving');
      callGAS('saveStudentResult', {
        name: studentName, sheetName: sheetMap[level] || '기타',
        questionCount: totalCount, score: `${correctCount}/${totalCount}`,
        correctItems: (cItems||[]).map(i => i.char),
        incorrectItems: (iItems||[]).map(i => i.char),
        voiceItems: voiceRecords.slice(0,4).map(r => `${r.task}: ${r.text}`)
      }).then(() => setRecordStatus('saved')).catch(() => setRecordStatus('error'));
    };

    const initAudio = () => {
      if (!audioCtx) audioCtx = new AudioContextClass();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    };
    const playChime = () => {
      if (isMuted) return; initAudio();
      const t = audioCtx.currentTime, osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25,t); osc.frequency.setValueAtTime(659.25,t+.1); osc.frequency.setValueAtTime(783.99,t+.2);
      gain.gain.setValueAtTime(.3,t); gain.gain.exponentialRampToValueAtTime(.01,t+1.5);
      osc.start(t); osc.stop(t+1.5);
    };
    const playWrong = () => {
      if (isMuted) return; initAudio();
      const t = audioCtx.currentTime, osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150,t); osc.frequency.linearRampToValueAtTime(100,t+.3);
      gain.gain.setValueAtTime(.3,t); gain.gain.exponentialRampToValueAtTime(.01,t+.5);
      osc.start(t); osc.stop(t+.5);
    };
    const speak = useCallback((text, rate=0.95, pitch=1.0, force=false) => {
      if (isMuted && !force) return;
      if (!window.speechSynthesis) return;
      const synth = window.speechSynthesis;
      if (synth.speaking) synth.cancel();
      if (!text) return;
      const utt = new SpeechSynthesisUtterance(String(text));
      utt.lang = 'ko-KR';
      const applyVoice = () => {
        const voices = synth.getVoices();
        let v = voices.find(vv => vv.lang==='ko-KR' && vv.name.toLowerCase().includes('google') && !vv.localService);
        if (!v) v = voices.find(vv => vv.lang==='ko-KR' && /wavenet|neural2?/i.test(vv.name));
        if (!v) v = voices.find(vv => vv.lang==='ko-KR' && /wavenet|neural|premium|enhanced|natural/i.test(vv.name));
        if (!v) v = voices.find(vv => vv.lang==='ko-KR');
        if (!v) v = voices.find(vv => vv.lang.startsWith('ko'));
        if (v) utt.voice = v;
      };
      if (synth.getVoices().length === 0) synth.onvoiceschanged = applyVoice; else applyVoice();
      utt.rate = rate; utt.pitch = pitch; utt.volume = 1.0;
      setTimeout(() => synth.speak(utt), 50);
    }, [isMuted]);

    useEffect(() => () => { if (window.speechSynthesis) window.speechSynthesis.cancel(); }, []);

    const consonants = [
      {char:'ㄱ',sound:'그',name:'기역'},{char:'ㄴ',sound:'느',name:'니은'},
      {char:'ㄷ',sound:'드',name:'디귿'},{char:'ㄹ',sound:'르',name:'리을'},
      {char:'ㅁ',sound:'므',name:'미음'},{char:'ㅂ',sound:'브',name:'비읍'},
      {char:'ㅅ',sound:'스',name:'시옷'},{char:'ㅇ',sound:'으',name:'이응'},
      {char:'ㅈ',sound:'즈',name:'지읒'},{char:'ㅊ',sound:'츠',name:'치읓'},
      {char:'ㅋ',sound:'크',name:'키읔'},{char:'ㅌ',sound:'트',name:'티읕'},
      {char:'ㅍ',sound:'프',name:'피읖'},{char:'ㅎ',sound:'흐',name:'히읗'}
    ];
    const vowels = [
      {char:'ㅏ',sound:'아'},{char:'ㅑ',sound:'야'},{char:'ㅓ',sound:'어'},
      {char:'ㅕ',sound:'여'},{char:'ㅗ',sound:'오'},{char:'ㅛ',sound:'요'},
      {char:'ㅜ',sound:'우'},{char:'ㅠ',sound:'유'},{char:'ㅡ',sound:'으'},{char:'ㅣ',sound:'이'}
    ];
    const levelData = {
      1:{name:'1단계: 모음 소리',items:vowels},
      2:{name:'2단계: 자음 소리',items:consonants},
      3:{name:'3단계: 한 글자 단어',items:[
        {char:'가',sound:'가',parts:['ㄱ','ㅏ']},{char:'나',sound:'나',parts:['ㄴ','ㅏ']},
        {char:'도',sound:'도',parts:['ㄷ','ㅗ']},{char:'미',sound:'미',parts:['ㅁ','ㅣ']},
        {char:'부',sound:'부',parts:['ㅂ','ㅜ']},{char:'서',sound:'서',parts:['ㅅ','ㅓ']},
        {char:'조',sound:'조',parts:['ㅈ','ㅗ']},{char:'하',sound:'하',parts:['ㅎ','ㅏ']}
      ]},
      4:{name:'4단계: 두 글자 단어',items:[
        {char:'나비',sound:'나비',parts:['ㄴ','ㅏ','ㅂ','ㅣ']},{char:'우유',sound:'우유',parts:['ㅇ','ㅜ','ㅇ','ㅠ']},
        {char:'머리',sound:'머리',parts:['ㅁ','ㅓ','ㄹ','ㅣ']},{char:'하마',sound:'하마',parts:['ㅎ','ㅏ','ㅁ','ㅏ']},
        {char:'기차',sound:'기차',parts:['ㄱ','ㅣ','ㅊ','ㅏ']},{char:'포도',sound:'포도',parts:['ㅍ','ㅗ','ㄷ','ㅗ']},
        {char:'오리',sound:'오리',parts:['ㅇ','ㅗ','ㄹ','ㅣ']}
      ]}
    };

    const isConsonant = char => consonants.some(c => c.char === char);
    const isVowelSide = v => ['ㅏ','ㅑ','ㅓ','ㅕ','ㅣ'].includes(v);
    const combineHangul = (c, v) => {
      const cho = {ㄱ:0,ㄴ:2,ㄷ:3,ㄹ:5,ㅁ:6,ㅂ:7,ㅅ:9,ㅇ:11,ㅈ:12,ㅊ:14,ㅋ:15,ㅌ:16,ㅍ:17,ㅎ:18};
      const jung = {ㅏ:0,ㅑ:2,ㅓ:4,ㅕ:6,ㅗ:8,ㅛ:12,ㅜ:13,ㅠ:17,ㅡ:18,ㅣ:20};
      if (cho[c] !== undefined && jung[v] !== undefined)
        return String.fromCharCode((cho[c]*21+jung[v])*28+0xAC00);
      return c + v;
    };
    const getConsonantName = ch => { const c = consonants.find(x => x.char===ch); return c ? c.name : ch; };
    const getConsonantSound = ch => { const c = consonants.find(x => x.char===ch); return c ? c.sound : ch; };
    const getVowelSound = ch => { const v = vowels.find(x => x.char===ch); return v ? v.sound : ch; };

    const goSelectLevel = () => {
      if (!studentName) { speak('이름을 선택해줘!'); return; }
      setStage('select_level'); speak(`${studentName} 친구, 반가워! 어떤 공부를 해볼까?`);
    };
    const selectLevel = lvl => { initAudio(); setLevel(lvl); setSelectedCount(5); setShowCountModal(true); };
    const startLevel = (count, overrideLvl) => {
      initAudio();
      const lvl = overrideLvl !== undefined ? overrideLvl : level;
      setQuestionCount(count); setShowCountModal(false);
      setTutorialStep(1); setTutorialSubStep(0); setTutorialEditPhase(false);
      setTutorialSlotFilled([true,true,true,true]); setShowTutorial(true);
      setStage('level_active'); setProgress(0); setWrongTasks([]);
      setCorrectItems([]); setIncorrectItems([]);
      setCurrentTaskIndex(0); setAttempts(0); setVoiceRecords([]);
      setHasReviewed(false); setTutorialVoiceStep(1);
      const selected = [...levelData[lvl].items].sort(()=>Math.random()-.5).slice(0,Math.min(count,levelData[lvl].items.length));
      setActiveItems(selected); setCurrentTask(selected[0]); setUserInput([]);
    };

    const handleInput = char => {
      if (!currentTask || showCompletePopup) return;
      if (level <= 2) { setUserInput([char]); speak(char,.8,1,false); }
      else {
        const newInput = [...userInput, char]; setUserInput(newInput); speak(char,.8,1,false);
        if (newInput.length === currentTask.parts.length) speak('글자가 완성되었어요! 확인 버튼을 눌러보세요.',.95,1,false);
      }
    };

    const buildSuccessSpeech = task => {
      if (level===1) return `${task.char}! 잘했어요!`;
      if (level===2) return `${task.char}, ${getConsonantSound(task.char)} 소리예요! 잘했어요!`;
      if (level===3) { const c=task.parts[0],v=task.parts[1]; return `${c} ${getConsonantSound(c)} 더하기 ${v} ${getVowelSound(v)}, 합쳐서 ${task.char}! 잘했어요!`; }
      if (level===4) {
        const c1=task.parts[0],v1=task.parts[1],c2=task.parts[2],v2=task.parts[3];
        const s1=task.char.charAt(0),s2=task.char.charAt(1);
        return `${c1} ${getConsonantSound(c1)} 더하기 ${v1} ${getVowelSound(v1)} 는 ${s1}, ${c2} ${getConsonantSound(c2)} 더하기 ${v2} ${getVowelSound(v2)} 는 ${s2}. 합쳐서 ${task.char}!`;
      }
      return `${task.char}! 정답이야!`;
    };
    const buildFailureSpeech = wrong => {
      if (!wrong) return '아까워요! 다시 한 번 들어볼까요?';
      if (level===1) { const v=vowels.find(x=>x.char===wrong); return v?`아차! 그건 ${v.sound} 소리예요. 다시 잘 들어보세요!`:'아차! 다시 들어볼까요?'; }
      if (level===2) {
        const c=consonants.find(x=>x.char===wrong), correct=consonants.find(x=>x.char===currentTask.char);
        if (c&&correct) return `아차! ${c.name}을 골랐어요. ${correct.name}을 찾아야 해요!`;
        return '아차! 다시 들어볼까요?';
      }
      return `아차! ${wrong}이(가) 아니에요. 다시 한 번 잘 들어보세요!`;
    };

    const handleCheck = () => {
      if (userInput.length===0) return;
      let finalInput = '';
      if (level===3) {
        const c=userInput.find(isConsonant), v=userInput.find(vv=>vowels.some(vo=>vo.char===vv));
        finalInput = c&&v ? combineHangul(c,v) : userInput.join('');
      } else if (level===4) {
        const parts=currentTask.parts, rem=[...userInput];
        const slotted=parts.map(p=>{ const i=rem.indexOf(p); if(i!==-1){rem.splice(i,1);return p;} return rem.shift()||''; });
        finalInput=combineHangul(slotted[0]||'',slotted[1]||'')+combineHangul(slotted[2]||'',slotted[3]||'');
      } else { finalInput=userInput.join(''); }
      finalInput===currentTask.char ? handleSuccess() : handleFailure(finalInput);
    };

    const handleFailure = (wrong='') => {
      playWrong(); setAttempts(a=>a+1); setLastWrongAnswer(wrong); setShowWrongPopup(true);
      if (!incorrectItems.some(i=>i.char===currentTask.char)) setIncorrectItems(prev=>[...prev,currentTask]);
      speak(buildFailureSpeech(wrong));
    };
    const handleSuccess = () => {
      playChime();
      if (window.confetti) window.confetti({particleCount:100,spread:70,origin:{y:.6},colors:['#FACC15','#4ADE80','#60A5FA','#F472B6'],useWorker:false});
      setFeedbackText('정답이야! 참 잘했어!'); setShowCompletePopup(true); setStars(s=>s+1);
      if (attempts===0 && !incorrectItems.some(i=>i.char===currentTask.char) && !correctItems.some(i=>i.char===currentTask.char))
        setCorrectItems(prev=>[...prev,currentTask]);
      speak(buildSuccessSpeech(currentTask));
      setVoiceText(''); setVoiceSaved(false); setIsRecording(false); setVoiceFeedback(null);
    };

    const finishTask = () => {
      setShowCompletePopup(false);
      const items = stage==='review_wrong' ? wrongTasks : activeItems;
      setProgress(prev=>Math.min(prev+100/items.length,100));
      const nextIdx = currentTaskIndex+1; setCurrentTaskIndex(nextIdx);
      if (nextIdx < items.length) {
        setCurrentTask(items[nextIdx]); setUserInput([]); setAttempts(0);
        setTimeout(()=>speakTaskSound(items[nextIdx],false),500);
      } else {
        setStage('complete');
        const correctCount=items.length-incorrectItems.length;
        if (stage!=='review_wrong') recordActivity(correctCount,items.length,correctItems,incorrectItems);
        speak('와! 모든 문제를 끝냈어! 학습 결과 보고서를 확인해볼까?');
      }
    };

    useEffect(() => {
      heardRef.current=false;
      if (autoTimerRef.current){clearTimeout(autoTimerRef.current);autoTimerRef.current=null;}
      return ()=>{if(autoTimerRef.current)clearTimeout(autoTimerRef.current);};
    }, [currentTask]);

    useEffect(() => {
      if (autoTimerRef.current){clearTimeout(autoTimerRef.current);autoTimerRef.current=null;}
      const inGame=currentTask&&(stage==='level_active'||stage==='review_wrong');
      const noPopup=!showTutorial&&!showCompletePopup&&!showWrongPopup;
      if (inGame&&noPopup&&!heardRef.current) {
        autoTimerRef.current=setTimeout(()=>{
          if(!heardRef.current&&currentTask){speakTaskSound(currentTask,true);heardRef.current=true;}
          autoTimerRef.current=null;
        },3000);
      }
    }, [currentTask,stage,showTutorial,showCompletePopup,showWrongPopup]);

    const speakTaskSound = (task, force=true) => {
      if (level===4&&task.char&&task.char.length>=2) {
        speak(task.char.charAt(0),.75,1,force);
        setTimeout(()=>speak(task.char.charAt(1),.75,1,force),750);
      } else { speak(task.sound,.75,1,force); }
    };
    const handleReplay = () => {
      initAudio();
      if (autoTimerRef.current){clearTimeout(autoTimerRef.current);autoTimerRef.current=null;}
      heardRef.current=true;
      if (currentTask) speakTaskSound(currentTask);
    };

    const evaluatePronunciation = (spoken, task) => {
      if (!spoken||!task) return 'retry';
      const s=spoken.trim().replace(/\s+/g,'');
      const target=(level<=2?task.sound:task.char)||task.char||'';
      if (!target) return 'retry';
      if (s===target||s.includes(target)||target===s) return 'perfect';
      const targetChars=[...target];
      const matchCount=targetChars.filter(c=>s.includes(c)).length;
      if (matchCount/targetChars.length>=0.5) return 'close';
      return 'retry';
    };

    const startRecording = () => {
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if (!SR){alert('음성 인식은 Chrome 브라우저에서만 사용할 수 있어요!');return;}
      if (isRecording){
        clearTimeout(recTimeoutRef.current);clearTimeout(silenceTimerRef.current);
        try{recognitionRef.current.stop();}catch(e){}
        return;
      }
      initAudio();
      const recognition=new SR();
      recognitionRef.current=recognition;
      recognition.lang='ko-KR'; recognition.continuous=true;
      recognition.interimResults=true; recognition.maxAlternatives=3;
      let bestFinal='', bestInterim='';
      const finalize=()=>{
        clearTimeout(recTimeoutRef.current);clearTimeout(silenceTimerRef.current);
        try{recognition.abort();}catch(e){}
      };
      const resetSilenceTimer=()=>{
        clearTimeout(silenceTimerRef.current);
        silenceTimerRef.current=setTimeout(finalize,1200);
      };
      setIsRecording(true); setVoiceText('듣는 중...'); setVoiceSaved(false); setVoiceFeedback(null);
      try{recognition.start();}catch(e){setIsRecording(false);setVoiceText('다시 눌러주세요');setVoiceFeedback('retry');return;}
      recTimeoutRef.current=setTimeout(finalize,12000);
      recognition.onresult=(e)=>{
        let interim='',finals='';
        for(let i=e.resultIndex;i<e.results.length;i++){
          if(e.results[i].isFinal)finals+=e.results[i][0].transcript;
          else interim+=e.results[i][0].transcript;
        }
        if(finals)bestFinal+=finals; if(interim)bestInterim=interim;
        const display=bestFinal||interim; if(display)setVoiceText(display.trim());
        if(finals||interim)resetSilenceTimer();
      };
      recognition.onspeechend=()=>resetSilenceTimer();
      recognition.onerror=(err)=>{
        if(err.error==='not-allowed'){clearTimeout(recTimeoutRef.current);clearTimeout(silenceTimerRef.current);setIsRecording(false);alert('마이크 권한이 필요해요!');}
        else if(err.error==='network'){clearTimeout(recTimeoutRef.current);clearTimeout(silenceTimerRef.current);setIsRecording(false);setVoiceText('네트워크 오류');setVoiceFeedback('retry');}
      };
      recognition.onend=()=>{
        clearTimeout(recTimeoutRef.current);clearTimeout(silenceTimerRef.current);setIsRecording(false);
        const result=(bestFinal||bestInterim).trim();
        if(!result){setVoiceText('다시 크게 말해보세요');setVoiceFeedback('retry');return;}
        setVoiceText(result);
        const fb=evaluatePronunciation(result,currentTask);
        setVoiceFeedback(fb);
        setVoiceRecords(prev=>[...prev,{task:currentTask?currentTask.char:'',text:result}]);
        callGAS('saveVoiceRecord',{name:studentName,level:levelData[level]?levelData[level].name:'',task:currentTask?currentTask.char:'',text:result})
          .then(()=>setVoiceSaved(true)).catch(()=>setVoiceSaved(true));
      };
    };

    const toggleMute = () => { initAudio(); setIsMuted(m => !m); };

    // ── JSX render ──
    return (
      <div className="h-screen w-full flex flex-col items-center justify-center select-none overflow-hidden relative p-4 md:p-6" style={{background:'#FFF9F2'}}>

        {/* Mute button (intro / name) */}
        {(stage==='intro'||stage==='select_name') && (
          <div className="fixed top-8 right-8 z-50">
            <button onClick={toggleMute} className={`p-6 rounded-3xl shadow-xl border-b-8 btn-bounce ${isMuted?'bg-slate-200 text-slate-500 border-slate-300':'bg-orange-500 text-white border-orange-900 pulse-anim'}`}>
              {isMuted?<VolumeX size={32}/>:<Volume2 size={32}/>}
            </button>
          </div>
        )}

        {/* Top bar */}
        {stage!=='intro'&&stage!=='select_name' && (
          <div className="w-full max-w-screen-xl flex items-center justify-between mb-2 absolute top-2 md:top-4 z-30 glass py-2 px-4 rounded-3xl shadow-premium">
            <div className="flex items-center gap-2">
              <button onClick={()=>setStage('intro')} className="p-3 bg-white rounded-2xl text-emerald-600 btn-bounce shadow-sm border border-emerald-100 flex items-center gap-2">
                <Home size={22}/><span className="hidden md:inline font-bold text-xl">홈</span>
              </button>
              {stage!=='select_level' && (
                <button onClick={()=>setStage('select_level')} className="px-4 py-3 bg-white rounded-2xl text-indigo-600 btn-bounce shadow-sm border-2 border-indigo-100 flex items-center">
                  <span className="font-black text-xl whitespace-nowrap">{levelData[level].name}</span>
                </button>
              )}
            </div>
            <div className="flex-grow mx-6 bg-slate-100 h-5 rounded-full shadow-inner overflow-hidden border border-slate-200">
              <div className="h-full bg-orange-500 progress-bar shadow-orange-300" style={{width:`${progress}%`,boxShadow:'0 0 12px rgba(255,109,0,0.4)'}}/>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={toggleMute} className={`p-3 rounded-2xl shadow-sm border-b-4 btn-bounce ${isMuted?'bg-slate-200 text-slate-500 border-slate-300':'bg-orange-500 text-white border-orange-900 pulse-anim'}`}>
                {isMuted?<VolumeX size={24}/>:<Volume2 size={24}/>}
              </button>
              <div className="flex items-center gap-2 bg-white px-5 py-2 rounded-2xl shadow-sm border border-blue-100">
                <span className="font-black text-blue-600 text-xl whitespace-nowrap">{studentName} 친구</span>
              </div>
            </div>
          </div>
        )}

        {/* ── Intro ── */}
        {stage==='intro' && (
          <div key="intro" className="page-enter flex flex-col items-center justify-center w-full max-w-screen-xl text-center px-4">
            <PencilFairy className="mb-4"/>
            <div className="inline-block bg-white border-2 border-orange-200 text-orange-500 px-8 py-3 rounded-full text-3xl font-black mb-4 shadow-sm">국어 1-2학년군</div>
            <h1 className="text-7xl md:text-8xl font-black text-indigo-900 mb-8 tracking-tight">한글자모탐험</h1>
            <div className="relative w-full max-w-5xl mb-6">
              <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-orange-500 text-white border-b-8 border-orange-900 px-8 py-3 rounded-3xl shadow-xl z-10 flex items-center gap-3 text-3xl font-black whitespace-nowrap">
                <Volume2 size={32}/> 오늘의 공부 약속
              </div>
              <div className="bg-white p-12 pt-20 rounded-3xl shadow-premium border-4 border-orange-50 flex items-center justify-center">
                <p className="text-3xl md:text-4xl font-black text-slate-700 leading-relaxed whitespace-nowrap">"소리를 잘 듣고 알맞은 글자를 찾아볼까요?"</p>
              </div>
            </div>
            <button onClick={()=>{initAudio();setStage('select_name');}} className="w-full max-w-md py-3 bg-orange-500 text-white rounded-3xl text-4xl font-black shadow-2xl btn-bounce border-b-8 border-orange-950 flex items-center justify-center gap-4">
              활동 시작! <ChevronRight size={48}/>
            </button>
            <p className="mt-6 text-slate-400 text-2xl font-bold">상단 스피커 버튼을 눌러 소리를 켜세요!</p>
          </div>
        )}

        {/* ── Select Name ── */}
        {stage==='select_name' && (
          <div key="name" className="page-enter flex flex-col items-center justify-center w-full max-w-2xl text-center">
            <div className="bg-white p-12 rounded-3xl shadow-premium border-b-8 border-orange-50 w-full relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-3 bg-orange-500/10"/>
              <PencilFairy className="mb-8 scale-75"/>
              <h2 className="text-4xl font-black text-indigo-900 mb-3">누가 공부하러 왔을까?</h2>
              <p className="text-slate-500 text-2xl font-bold mb-10">이름을 선택해 보세요!</p>
              <div className="relative w-full mb-12">
                {isLoadingNames ? (
                  <div className="flex flex-col items-center gap-4 p-8">
                    <RefreshCw className="text-orange-500 spin-loop" size={40}/>
                    <p className="text-2xl font-bold text-slate-400">학생 명단을 불러오는 중...</p>
                  </div>
                ) : (
                  <select value={studentName} onChange={e=>{setStudentName(e.target.value);speak(e.target.value+' 친구!');}}
                    className="w-full p-6 bg-slate-50 border-4 border-slate-100 rounded-3xl text-2xl font-black text-slate-700 appearance-none cursor-pointer focus:outline-none focus:border-orange-400 transition-all text-center shadow-inner" style={{paddingRight:'3rem'}}>
                    <option value="">-- 이름을 선택하세요 --</option>
                    {students.map((s,i)=><option key={i} value={typeof s==='string'?s:s.name}>{typeof s==='string'?s:`${s.num}번 ${s.name}`}</option>)}
                  </select>
                )}
                <div className="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                  <ChevronRight className="rotate-90" size={32}/>
                </div>
              </div>
              <div className="flex flex-col md:flex-row gap-4 justify-center">
                <button onClick={()=>setStage('intro')} className="px-8 py-6 bg-slate-100 text-slate-500 rounded-3xl text-2xl font-black border-b-8 border-slate-200 btn-bounce">다시 돌아가기</button>
                <button onClick={goSelectLevel} className={`px-12 py-6 text-white rounded-3xl text-3xl font-black shadow-xl border-b-8 btn-bounce ${studentName?'bg-orange-500 border-orange-950':'bg-slate-300 border-slate-400'}`}>공부 시작하기!</button>
              </div>
            </div>
          </div>
        )}

        {/* ── Select Level ── */}
        {stage==='select_level' && (
          <div key="select" className="page-enter grid grid-cols-2 lg:grid-cols-4 gap-6 xl:gap-10 w-full max-w-screen-xl mt-20 md:mt-24">
            {[1,2,3,4].map(num=>{
              const fullName=levelData[num].name;
              const colonIdx=fullName.indexOf(':');
              const numPart=colonIdx>-1?fullName.slice(0,colonIdx).trim():fullName;
              const namePart=colonIdx>-1?fullName.slice(colonIdx+1).trim():'';
              return (
                <button key={num} onClick={()=>selectLevel(num)}
                  className={`bg-white p-10 rounded-3xl shadow-premium border-4 flex flex-col items-center justify-center btn-bounce min-h-48 ${num===1?'border-pink-200 hover:border-pink-400 text-pink-600':num===2?'border-blue-200 hover:border-blue-400 text-blue-600':num===3?'border-sky-200 hover:border-sky-400 text-sky-600':'border-emerald-200 hover:border-emerald-400 text-emerald-600'}`}>
                  <div className="text-center font-black flex flex-col items-center gap-2">
                    <div className="text-3xl xl:text-4xl whitespace-nowrap">{numPart}</div>
                    {namePart && <div className="text-2xl xl:text-3xl whitespace-nowrap">{namePart}</div>}
                  </div>
                </button>
              );
            })}
          </div>
        )}

        {/* ── Level Active / Review Wrong ── */}
        {(stage==='level_active'||stage==='review_wrong') && currentTask && (
          <div key="active" className="slide-right-enter w-full px-1 flex flex-col gap-4 mt-6 md:mt-10 pb-4">
            {stage==='review_wrong' && (
              <div className="bg-orange-100 text-orange-600 px-8 py-2 rounded-full text-xl font-black flex items-center gap-3 border border-orange-200 self-center">
                <RefreshCw size={22} className="spin-slow"/> 틀린 문제 복습 중!
              </div>
            )}
            <div className="flex flex-col xl:flex-row gap-4 xl:gap-6 w-full items-stretch" style={{maxHeight:'88vh'}}>
              {/* Left panel */}
              <div className="bg-white p-6 xl:p-10 rounded-3xl shadow-premium flex-1 flex flex-col items-center justify-center relative" style={{borderBottom:'1rem solid #FFF9F2',minHeight:'26rem'}}>
                <div className="text-orange-600 font-black text-2xl xl:text-3xl mb-4 bg-white border-2 border-orange-400 px-8 py-2 rounded-full absolute top-4 left-1/2 -translate-x-1/2 shadow-md z-10 text-center whitespace-nowrap">{levelData[level].name}</div>
                <div className={`bg-bg p-8 xl:p-12 rounded-3xl border-4 border-dashed border-orange-200 mb-6 xl:mb-8 w-full ${level===4?'max-w-2xl':level===3?'max-w-md':'max-w-xs'} flex flex-col justify-center items-center shadow-inner mt-10 relative`} style={{paddingTop:'4rem'}}>
                  <div className="absolute top-6 text-orange-300 font-black text-2xl">문제 {currentTaskIndex+1} / {(stage==='review_wrong'?wrongTasks:activeItems).length}</div>
                  {level<=2 && (()=>{
                    const ch=userInput[0], isVowelType=level===1;
                    return <div title={ch?'클릭하면 지울 수 있어요':''} onClick={()=>ch&&setUserInput([])}
                      className={`w-32 h-32 rounded-3xl flex items-center justify-center text-8xl font-black border-b-8 shadow-sm transition-all ${ch?`${isVowelType?'bg-pink-500 border-pink-800':'bg-blue-500 border-blue-800'} text-white cursor-pointer hover:opacity-80 hover:scale-95 active:scale-90`:'bg-white text-orange-100 border-slate-100'}`}>
                      {ch||'?'}
                    </div>;
                  })()}
                  {level===3 && (()=>{
                    const c=userInput.find(isConsonant), v=userInput.find(vv=>vowels.some(vo=>vo.char===vv));
                    const tV=currentTask.parts.find(p=>vowels.some(vo=>vo.char===p));
                    const side=tV&&isVowelSide(tV);
                    return <div className={`flex items-center justify-center gap-3 ${side?'flex-row':'flex-col'}`}>
                      <div title={c?'클릭하면 지울 수 있어요':''} onClick={()=>c&&setUserInput([])}
                        className={`w-24 h-24 rounded-3xl flex items-center justify-center text-5xl font-black border-b-8 shadow-sm transition-all ${c?'bg-blue-500 text-white border-blue-800 cursor-pointer hover:bg-blue-600 hover:scale-95 active:scale-90':'bg-white text-slate-100 border-slate-100'}`}>{c||'?'}</div>
                      <div title={v?'클릭하면 지울 수 있어요':''} onClick={()=>v&&setUserInput(prev=>prev.filter(ch=>isConsonant(ch)))}
                        className={`w-24 h-24 rounded-3xl flex items-center justify-center text-5xl font-black border-b-8 shadow-sm transition-all ${v?'bg-pink-500 text-white border-pink-800 cursor-pointer hover:bg-pink-600 hover:scale-95 active:scale-90':'bg-white text-slate-100 border-slate-100'}`}>{v||'?'}</div>
                    </div>;
                  })()}
                  {level===4 && (()=>{
                    const rp=idx=>{ const ch=userInput[idx]; const isc=ch&&isConsonant(ch);
                      return <div key={idx} title={ch?'클릭하면 지울 수 있어요':''} onClick={()=>ch&&setUserInput(prev=>prev.slice(0,idx))}
                        className={`w-24 md:w-28 h-24 md:h-28 rounded-2xl flex items-center justify-center text-5xl md:text-6xl font-black border-b-4 shadow-sm transition-all ${ch?(isc?'bg-blue-500 text-white border-blue-800':'bg-pink-500 text-white border-pink-800')+' cursor-pointer hover:opacity-75 hover:scale-95 active:scale-90':'bg-white text-slate-100 border-slate-100'}`}>{ch||'?'}</div>;
                    };
                    const lay=vi=>currentTask.parts[vi]&&isVowelSide(currentTask.parts[vi])?'flex-row':'flex-col';
                    return <div className="flex flex-row gap-8 items-center justify-center">
                      <div className={`flex items-center gap-3 ${lay(1)}`}>{rp(0)}{rp(1)}</div>
                      <div className={`flex items-center gap-3 ${lay(3)}`}>{rp(2)}{rp(3)}</div>
                    </div>;
                  })()}
                </div>
                <p className="mb-4 text-2xl xl:text-3xl font-black text-orange-700 text-center px-4">소리를 듣고 알맞은 글자를 골라 완성하세요!</p>
                <div className="flex flex-col gap-3 w-full px-8">
                  <button onClick={handleReplay} className="flex items-center justify-center gap-5 w-full py-4 bg-orange-500 text-white rounded-3xl text-3xl font-black shadow-2xl btn-bounce border-b-8 border-orange-950 hover:bg-orange-600 transition-colors">
                    <Volume2 size={40}/> 소리듣기
                  </button>
                  {userInput.length>0 && (
                    <button onClick={handleCheck} className="w-full py-4 bg-emerald-500 text-white rounded-3xl text-2xl font-black shadow-xl btn-bounce border-b-8 border-emerald-900 hover:bg-emerald-600 transition-colors">정답 확인하기</button>
                  )}
                </div>
              </div>
              {/* Right panel — keyboard */}
              <div className="glass p-6 xl:p-10 rounded-3xl flex-shrink-0 xl:flex-1 space-y-8 shadow-premium overflow-y-auto custom-scrollbar">
                {(level===2||level>=3) && (
                  <div>
                    <div className="text-blue-600 font-black text-3xl mb-4 px-3 flex items-center gap-3"><div className="w-2 h-8 bg-blue-600 rounded-full"/> 자음</div>
                    <div className={`grid gap-4 ${level===2?'grid-cols-5':'grid-cols-5 md:grid-cols-7 xl:grid-cols-8'}`}>
                      {consonants.map(c=><button key={c.char} onClick={()=>handleInput(c.char)}
                        className={`bg-white text-blue-600 rounded-2xl shadow-sm font-black border-b-4 border-slate-200 btn-bounce active:translate-y-0.5 active:border-b-0 ${level===2?"h-24 md:h-28 text-5xl md:text-6xl":"h-16 md:h-20 text-3xl"}`}>{c.char}</button>)}
                    </div>
                  </div>
                )}
                {(level===1||level>=3) && (
                  <div>
                    <div className="text-pink-600 font-black text-3xl mb-4 px-3 flex items-center gap-3"><div className="w-2 h-8 bg-pink-600 rounded-full"/> 모음</div>
                    <div className={`grid gap-4 ${level===1?'grid-cols-5':'grid-cols-5 md:grid-cols-7 xl:grid-cols-8'}`}>
                      {vowels.map(v=><button key={v.char} onClick={()=>handleInput(v.char)}
                        className={`bg-white text-pink-600 rounded-2xl shadow-sm font-black border-b-4 border-slate-200 btn-bounce active:translate-y-0.5 active:border-b-0 ${level===1?"h-24 md:h-28 text-5xl md:text-6xl":"h-16 md:h-20 text-3xl"}`}>{v.char}</button>)}
                    </div>
                  </div>
                )}
                <div className="flex justify-center pt-4">
                  <button onClick={()=>setUserInput([])} className="flex items-center gap-2 text-slate-400 hover:text-slate-600 text-2xl font-black p-3 rounded-2xl hover:bg-white transition-all">
                    <RefreshCw size={24}/> 다시 쓰기
                  </button>
                </div>
              </div>
            </div>
          </div>

        {/* ── Complete ── */}
        {stage==='complete' && (
          <div key="complete" className="page-enter flex flex-col items-center w-full max-w-screen-xl px-4 mt-20 md:mt-24 pb-16 overflow-y-auto custom-scrollbar" style={{maxHeight:'calc(100dvh - 2rem)'}}>
            <div ref={reportRef} className="bg-white p-6 md:p-10 rounded-3xl shadow-premium w-full text-center border-4 border-orange-50 relative overflow-hidden">
              <div className="text-7xl mb-6">🏆</div>
              <h1 className="text-5xl md:text-6xl font-black text-orange-500 mb-8">[{studentName}] 학습 결과 보고서</h1>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                {[
                  {bg:'bg-blue-50',bc:'border-blue-100',tc:'text-blue-400',vc:'text-blue-700',label:'학습자 성명',val:`${studentName} 친구`},
                  {bg:'bg-orange-50',bc:'border-orange-100',tc:'text-orange-400',vc:'text-orange-700',label:'학습 단계',val:levelData[level].name},
                  {bg:'bg-yellow-50',bc:'border-yellow-100',tc:'text-yellow-600',vc:'text-yellow-700',label:'학습한 날짜',val:learningDate}
                ].map((c,i)=>(
                  <div key={i} className={`${c.bg} p-6 rounded-2xl border ${c.bc} text-left`}>
                    <div className={`text-2xl ${c.tc} font-black mb-3 tracking-wide`}>{c.label}</div>
                    <div className={`text-4xl ${c.vc} font-black leading-tight`}>{c.val}</div>
                  </div>
                ))}
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100 text-left">

                                  };
                                  const slotClass=(isC,idx)=>`relative w-16 h-16 rounded-2xl flex items-center justify-center text-3xl font-black border-b-4 transition-all ${tutorialSlotFilled[idx]?`${isC?'bg-blue-500 border-blue-800':'bg-pink-500 border-pink-800'} text-white cursor-pointer hover:opacity-75 hover:scale-95 active:scale-90 scale-pulse-loop`:'bg-white text-slate-200 border-slate-100'}`;
                                  const badge=(idx)=>tutorialSlotFilled[idx]?<div style={{position:'absolute',top:'-6px',right:'-6px',background:'#ef4444',color:'white',width:'18px',height:'18px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'900'}}>×</div>:null;
                                  if(level<=2){
                                    const isVowelType=level===1;
                                    return <div className={slotClass(!isVowelType,0)+' !w-24 !h-24 !text-5xl'} onClick={()=>onSlotClick(0)} title={tutorialSlotFilled[0]?"눌러서 지워봐요!":""}>
                                      {tutorialSlotFilled[0]?(tc.target||tc.pC):"?"}{badge(0)}
                                    </div>;
                                  }
                                  if(level===3){
                                    const side=['ㅏ','ㅑ','ㅓ','ㅕ','ㅣ'].includes(tc.pV);
                                    return <div className={`flex items-center justify-center gap-3 ${side?'flex-row':'flex-col'}`}>
                                      <div className={slotClass(true,0)} onClick={()=>onSlotClick(0)}>{tutorialSlotFilled[0]?tc.pC:"?"}{badge(0)}</div>
                                      <div className={slotClass(false,1)} onClick={()=>onSlotClick(1)}>{tutorialSlotFilled[1]?tc.pV:"?"}{badge(1)}</div>
                                    </div>;
                                  }
                                  const side1=['ㅏ','ㅑ','ㅓ','ㅕ','ㅣ'].includes(tc.pV);
                                  const side2=['ㅏ','ㅑ','ㅓ','ㅕ','ㅣ'].includes(tc.pV2||'ㅣ');
                                  return <div className="flex items-center justify-center gap-4">
                                    <div className={`flex items-center gap-1.5 ${side1?'flex-row':'flex-col'}`}>
                                      <div className={slotClass(true,0)} onClick={()=>onSlotClick(0)}>{tutorialSlotFilled[0]?tc.pC:"?"}{badge(0)}</div>
                                      <div className={slotClass(false,1)} onClick={()=>onSlotClick(1)}>{tutorialSlotFilled[1]?tc.pV:"?"}{badge(1)}</div>
                                    </div>
                                    <div className={`flex items-center gap-1.5 ${side2?'flex-row':'flex-col'}`}>
                                      <div className={slotClass(true,2)} onClick={()=>onSlotClick(2)}>{tutorialSlotFilled[2]?tc.pC2||'ㅂ':"?"}{badge(2)}</div>
                                      <div className={slotClass(false,3)} onClick={()=>onSlotClick(3)}>{tutorialSlotFilled[3]?tc.pV2||'ㅣ':"?"}{badge(3)}</div>
                                    </div>
                                  </div>;
                                })()}
                              </div>
                            ):(
                              <div className="w-24 h-24 border-4 border-dashed border-orange-100 rounded-3xl flex items-center justify-center text-5xl font-black text-orange-200">?</div>
                            )}
                            {!tutorialEditPhase && (
                              <button onClick={()=>{if(tutorialStep===1){speak(tc.soundName,.75,1,true);setTimeout(()=>setTutorialStep(2),1200);}}}
                                className={`w-full py-4 bg-orange-500 rounded-3xl flex items-center justify-center gap-3 text-white shadow-xl border-b-8 border-orange-950 text-2xl font-black btn-bounce ${tutorialStep!==1?'pointer-events-none opacity-70':''}`}>
                                <Volume2 size={36}/> 소리듣기
                              </button>
                            )}
                            {tutorialStep===1 && <div className="text-orange-500 text-xl font-black bounce-loop">↑ 버튼을 눌러보세요!</div>}
                          </div>
                          {/* Right: choice grid */}
                          <div className={`bg-white p-8 rounded-3xl w-full md:w-80 transition-all ${tutorialStep===2&&!tutorialEditPhase?'ring-4 ring-pink-400/40 shadow-xl scale-105':'opacity-50 pointer-events-none'}`}>
                            <div className={`text-xl font-black mb-4 px-2 ${level===1?'text-pink-500':'text-blue-500'}`}>{tc.type}</div>
                            <div className="grid grid-cols-4 gap-3">
                              {(tc.list||[]).map(t=>{
                                const isCtarget=level<3?t===tc.target:tutorialSubStep===0&&t===tc.pC;
                                const isVtarget=level>=3&&tutorialSubStep===1&&t===tc.pV;
                                const isCtarget2=level===4&&tutorialSubStep===2&&t===tc.pC2;
                                const isVtarget2=level===4&&tutorialSubStep===3&&t===tc.pV2;
                                const isVowelType=isVtarget||isVtarget2;
                                const isActive=tutorialStep===2&&(isCtarget||isVtarget||isCtarget2||isVtarget2);
                                return <div key={t} onClick={()=>{
                                  if(tutorialStep!==2)return;
                                  if(level<3&&isCtarget){setTimeout(()=>{setTutorialEditPhase(true);setTutorialSlotFilled([true,true,true,true]);},400);}
                                  else if(isCtarget){setTutorialSubStep(1);}
                                  else if(isVtarget&&level===4){setTutorialSubStep(2);}
                                  else if(isVtarget&&level<4){setTimeout(()=>{setTutorialEditPhase(true);setTutorialSlotFilled([true,true,true,true]);},400);}
                                  else if(isCtarget2){setTutorialSubStep(3);}
                                  else if(isVtarget2){setTimeout(()=>{setTutorialEditPhase(true);setTutorialSlotFilled([true,true,true,true]);},400);}
                                }} className={`h-14 rounded-2xl flex items-center justify-center text-2xl font-black transition-all ${isActive?`${isVowelType?'bg-pink-500':'bg-blue-500'} text-white scale-pulse-loop cursor-pointer`:'bg-slate-50 text-slate-300'} ${tutorialStep===2&&!isActive?'pointer-events-none':''}`}>{t}</div>;
                              })}
                            </div>
                            {tutorialStep===2&&!tutorialEditPhase&&<div className="text-pink-500 text-xl font-black text-center mt-4 bounce-loop">↑ 여기를 눌러보세요!</div>}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
          </div>
        )}
      </div>
    );
  };

  const root = createRoot(document.getElementById('root'));
  root.render(<App/>);
  </script>
</body>
</html>
